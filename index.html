<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>XLSX Compare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#1e1e1e;color:#e8e8e8;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:15px}
header{background:#252526;padding:14px 22px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #3c3c3c;flex-shrink:0}
header h1{font-size:20px;font-weight:700;color:#fff;white-space:nowrap}
.dz{border:2px dashed #555;border-radius:6px;padding:10px 18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:230px;transition:border-color .15s}
.dz:hover,.dz.over{border-color:#0e7eff}
.dz .lbl{font-size:12px;color:#aaa;font-weight:600}
.dz .fn{font-size:14px;color:#4ec9b0;font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dz input{display:none}
#cmpBtn{margin-left:auto;background:#0e7eff;color:#fff;border:none;border-radius:5px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer}
#cmpBtn:disabled{background:#3c3c3c;color:#666;cursor:default}
.view-tabs{display:flex;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0;padding:0 22px}
.view-tab{padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;color:#aaa;border-bottom:3px solid transparent;transition:color .15s}
.view-tab:hover{color:#e8e8e8}
.view-tab.active{color:#fff;border-bottom-color:#0e7eff}
.panel{display:none;flex:1;overflow:auto;padding:20px}
.panel.active{display:flex;flex-direction:column;gap:16px}
#placeholder{display:flex;align-items:center;justify-content:center;flex:1;color:#777;font-size:16px;font-weight:500}
/* SUMMARY */
.badge{display:inline-block;border-radius:4px;padding:2px 9px;font-size:12px;font-weight:700}
.b-add{background:#1a4a1a;color:#5ddb9e}
.b-del{background:#4a1a1a;color:#ff6b6b}
.b-mod{background:#4a3a00;color:#ffd166}
.b-none{color:#666}
.cards{display:flex;flex-wrap:wrap;gap:16px}
.card{background:#252526;border:1px solid #3c3c3c;border-radius:10px;padding:18px 22px;width:280px;flex:0 0 280px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s;overflow:hidden}
.card:hover{border-color:#666}
.card.c-add{border-left:4px solid #5ddb9e}
.card.c-del{border-left:4px solid #ff6b6b}
.card.c-mod{border-left:4px solid #ffd166}
.card.c-ok{border-left:4px solid #3c3c3c}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}
.card-name{font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.card-stats{display:flex;gap:8px}
.stat{display:flex;flex-direction:column;align-items:center;background:#2d2d2d;border-radius:6px;padding:8px 0;flex:1}
.stat .num{font-size:22px;font-weight:800;line-height:1}
.stat .lbl{font-size:11px;color:#aaa;font-weight:600;margin-top:3px}
.stat.s-add .num{color:#5ddb9e}
.stat.s-del .num{color:#ff6b6b}
.stat.s-mod .num{color:#ffd166}
.stat.s-tot .num{color:#e8e8e8}
.card-footer{font-size:12px;color:#888;font-weight:500}
.sum-overview{display:flex;gap:16px;flex-shrink:0;padding:4px 0}
.ov-stat{background:#252526;border:1px solid #3c3c3c;border-radius:8px;padding:12px 20px;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:#ccc}
.ov-stat .big{font-size:30px;font-weight:800}
.ov-stat.ov-add .big{color:#5ddb9e}
.ov-stat.ov-del .big{color:#ff6b6b}
.ov-stat.ov-mod .big{color:#ffd166}
.ov-stat.ov-sh .big{color:#6ab0f5}
/* GRID */
.sheet-tabs{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
.stab{padding:7px 16px;font-size:13px;font-weight:600;border-radius:5px 5px 0 0;cursor:pointer;background:#2d2d2d;color:#aaa;border:1px solid #3c3c3c;border-bottom:none}
.stab.active{background:#1e1e1e;color:#fff;border-color:#555}
.stab.chg{color:#ffd166}
.stab.sadd{color:#5ddb9e}
.stab.sdel{color:#ff6b6b}
.grid-toolbar{display:flex;gap:10px;align-items:center;flex-shrink:0;padding:6px 0}
.grid-toolbar .sep{color:#444;margin:0 4px}
.tbtn{background:#2d2d2d;border:1px solid #3c3c3c;color:#ccc;border-radius:4px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
.tbtn.active{background:#0e7eff;border-color:#0e7eff;color:#fff}
.lock-hint{font-size:12px;color:#666;font-style:italic}
.grid-wrap{overflow:auto;flex:1}
table{border-collapse:collapse;font-size:14px}
th{background:#2d2d2d;color:#bbb;padding:6px 14px;border:1px solid #3c3c3c;font-weight:700;position:sticky;top:0;z-index:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;min-width:60px}
th .resize-h{position:absolute;right:0;top:0;width:6px;height:100%;cursor:col-resize;z-index:10;background:transparent}
th .resize-h:hover,th .resize-h.dragging{background:#0e7eff88}
td{padding:5px 14px;border:1px solid #2d2d2d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e8e8e8;font-weight:500;position:relative}
.rn{color:#666;text-align:right;user-select:none;background:#252526!important;font-weight:400;position:sticky;left:0;z-index:1;cursor:pointer;min-width:50px;max-width:50px;width:50px}
.rn:hover{background:#2a3a4a!important;color:#6ab0f5}
.rn .resize-v{position:absolute;bottom:0;left:0;width:100%;height:6px;cursor:row-resize;z-index:10;background:transparent}
.rn .resize-v:hover,.rn .resize-v.dragging{background:#0e7eff88}
th.rn{z-index:3;cursor:pointer}
th.rn:hover{background:#2a3a4a!important;color:#6ab0f5}
td.ca{background:#1a4a1a!important;color:#5ddb9e;font-weight:700}
td.cr{background:#4a1a1a!important;color:#ff8080;font-weight:700}
td.cm{background:#4a3a00!important;color:#ffd166;font-weight:700}
td.cm .diff-old{color:#ff8080;text-decoration:line-through;font-weight:600}
td.cm .diff-arr{color:#888;margin:0 4px}
td.cm .diff-new{color:#5ddb9e;font-weight:700}
th.cl{background:#1a2a3a!important;color:#6ab0f5;border-bottom:2px solid #0e7eff}
th.cr-pin{background:#1a2a3a!important;color:#6ab0f5;border-bottom:2px solid #0e7eff}
td.cl{position:sticky;z-index:1;background:#1e2a38!important;border-right:2px solid #0e7eff55}
td.cr-pin{position:sticky;z-index:1;background:#1e2a38!important;border-left:2px solid #0e7eff55}
tr.row-locked>td{background:#1e2a38;border-bottom:2px solid #0e7eff33}
tr.row-locked>td.ca{background:#1a4a2a!important}
tr.row-locked>td.cr{background:#4a1a28!important}
tr.row-locked>td.cm{background:#3a2a00!important}
.no-chg{color:#888;font-size:14px;font-weight:500;padding:10px 0}
/* ALL CHANGES */
.chg-list{display:flex;flex-direction:column;gap:6px}
.chg-item{background:#252526;border:1px solid #3c3c3c;border-radius:5px;padding:10px 16px;font-size:14px;font-weight:500;display:grid;grid-template-columns:120px 140px 100px 1fr 1fr;gap:10px;align-items:center;color:#e8e8e8}
.chg-item:hover{background:#2c2c2c}
.chg-hdr{background:#2d2d2d;border-radius:5px;padding:8px 16px;font-size:12px;color:#aaa;display:grid;grid-template-columns:120px 140px 100px 1fr 1fr;gap:10px;font-weight:700;flex-shrink:0}
.val-old{color:#ff6b6b;text-decoration:line-through;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.val-new{color:#5ddb9e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.filter-bar{display:flex;gap:10px;align-items:center;flex-shrink:0}
.filter-bar input{background:#2d2d2d;border:1px solid #3c3c3c;color:#e8e8e8;border-radius:5px;padding:7px 12px;font-size:14px;width:260px}
.filter-bar select{background:#2d2d2d;border:1px solid #3c3c3c;color:#e8e8e8;border-radius:5px;padding:7px 10px;font-size:14px;font-weight:600}
.count{font-size:14px;font-weight:600;color:#aaa;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>📊 XLSX Compare</h1>
  <div class="dz" id="dz1" onclick="document.getElementById('f1').click()">
    <input type="file" id="f1" accept=".xlsx"/>
    <span class="lbl">File A — Original</span>
    <span class="fn" id="fn1">Drop or click…</span>
  </div>
  <div class="dz" id="dz2" onclick="document.getElementById('f2').click()">
    <input type="file" id="f2" accept=".xlsx"/>
    <span class="lbl">File B — Modified</span>
    <span class="fn" id="fn2">Drop or click…</span>
  </div>
  <button id="cmpBtn" disabled>Compare</button>
</header>

<div class="view-tabs" id="viewTabs" style="display:none">
  <div class="view-tab active" data-view="summary">Summary</div>
  <div class="view-tab" data-view="grid">Sheet Grid</div>
  <div class="view-tab" data-view="changes">All Changes</div>
</div>

<div id="placeholder">Select two .xlsx files and click Compare</div>

<div class="panel" id="pSummary">
  <div class="sum-overview" id="sumOverview"></div>
  <div class="cards" id="sumCards"></div>
</div>

<div class="panel" id="pGrid">
  <div class="sheet-tabs" id="sheetTabs"></div>
  <div class="grid-toolbar">
    <button class="tbtn" id="hideUnchangedBtn" onclick="toggleHideUnchanged()">Hide Unchanged</button>
    <button class="tbtn" onclick="clearLocks()">Clear Locks</button>
    <span class="sep">|</span>
    <span class="lock-hint">Click col header: lock left · Shift+click: lock right · Click row#: lock row · Drag edges to resize</span>
  </div>
  <div class="grid-wrap" id="gridWrap"></div>
</div>

<div class="panel" id="pChanges">
  <div class="filter-bar">
    <input type="text" id="filterText" placeholder="Filter by sheet, column, value…"/>
    <select id="filterType">
      <option value="">All types</option>
      <option value="added">Added</option>
      <option value="deleted">Deleted</option>
      <option value="modified">Modified</option>
    </select>
    <select id="filterSheet"><option value="">All sheets</option></select>
    <span class="count" id="chgCount"></span>
  </div>
  <div class="chg-hdr"><span>Sheet</span><span>Column</span><span>Type</span><span>Old Value</span><span>New Value</span></div>
  <div class="chg-list" id="chgList"></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>
</body>
</html>
